<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <circle cx="12" cy="12" r="9" fill="#ffd66b" />
            <circle cx="15.5" cy="10.5" r="9" fill="#14141b" />
          </svg>
        </span>
        <div class="titles">
          <h1>Eclipse</h1>
          <p>simple dark mode</p>
        </div>
      </header>

      <main id="main">
        <div class="row">
          <div class="statusblock">
            <span id="dot" class="dot"></span>
            <span id="status" class="status">Off</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle" />
            <span class="slider"></span>
          </label>
        </div>

        <p class="site">On this site: <span id="site" class="host">—</span></p>
      </main>

      <p id="unsupported" class="unsupported" hidden>
        Dark mode can't run on this page. Open a normal website (http/https) and try again.
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
